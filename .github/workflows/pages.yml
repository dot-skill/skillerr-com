name: Deploy skillerr.com (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: dot-skill/skillerr
          path: skillerr

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build reference CLI (for fixtures)
        working-directory: skillerr
        run: npm ci && npm run build

      - name: Install site deps
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Build fixtures and site
        env:
          DOT_SKILL_ROOT: ${{ github.workspace }}/skillerr
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
